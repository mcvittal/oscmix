<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Room EQ</title>
<link rel="stylesheet" href="css/roomEq.css">
</head>
<body>

<h1>Room EQ [ChannelName]</h1>

<div class="eq-container">
  <canvas id="eqCanvas"></canvas>
  <div class="bands" id="bandsContainer"></div>
  <div class="toolbar">
    <div class="toolbar-left">
      <button class="bypass-btn state-on" id="bypassBtn" onclick="toggleBypass()">On</button>
      <div class="extra-knobs" id="extraKnobContainer"></div>
    </div>
    <div class="toolbar-right">
      <select class="preset-select" id="presetSelect">
        <option value="">— Preset —</option>
      </select>
      <input class="preset-name-input" id="presetName" type="text" placeholder="Name…"/>
      <button onclick="savePreset()">💾 Save</button>
      <button onclick="deletePreset()">🗑 Delete</button>
      <button onclick="resetEQ()">Reset</button>
      <button onclick="exportJSON()">⬇ JSON</button>
      <button onclick="document.getElementById('importFileInput').click()">⬆ JSON</button>
      <button onclick="exportTmreq()">⬇ tmreq</button>
      <button onclick="document.getElementById('importTmreqInput').click()">⬆ tmreq</button>
      <input type="file" id="importFileInput"   accept=".json"  onchange="importJSON(event)"/>
      <input type="file" id="importTmreqInput"  accept=".tmreq" onchange="importTmreq(event)"/>
    </div>
  </div>
</div>
<div class="tooltip" id="tooltip"></div>
<script src="js/roomEq.js" defer></script>
</body>
</html>
