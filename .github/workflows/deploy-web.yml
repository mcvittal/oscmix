name: Deploy Web to GitHub Pages

on:
  push:
    branches:
      - dev
    paths:
      - 'web/pub/**'
  workflow_dispatch:  

# Permissions needed for GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deployments
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    # This creates an environment in GitHub
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: dev  # Always checkout dev branch

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare web directory
        run: |
          # Ensure .nojekyll file exists for proper GitHub Pages serving
          touch web/.nojekyll
          
          # Check for WASM files and log if found
          if ls web/*.wasm 2>/dev/null; then
            echo "WASM files detected in web directory"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './web/pub'  # Only deploy the web folder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
