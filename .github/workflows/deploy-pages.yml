name: Deploy Pages

on:
  push:
    branches:
      - dev
    paths:
      - 'web/pub/**'
  workflow_dispatch: 
  

permissions:
  contents: write

jobs:
  deploy-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v6
        with:
          ref: dev
          path: dev-src

      - name: Checkout gh-pages branch (create if not exists)
        run: |
          git clone --branch gh-pages \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            gh-pages-repo 2>/dev/null || \
          (
            # Branch does not exist yet – create orphan
            mkdir gh-pages-repo && cd gh-pages-repo
            git init
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git checkout --orphan gh-pages
          )

      - name: Sync web/pub contents into gh-pages
        run: |
          cd gh-pages-repo
          # Remove all tracked files except .git
          find . -mindepth 1 -not -path './.git*' -delete
          # Copy contents of web/pub (not the directory itself) into gh-pages root
          cp -r ../dev-src/web/pub/. .

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit – working tree clean."
          else
            SHORT_SHA=$(cd ../dev-src && git rev-parse --short HEAD)
            git commit -m "ci: deploy web/pub from dev@${SHORT_SHA}"
            git push origin gh-pages
          fi
